<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>qC Blocker Extension</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">🧠</span>
      <div class="header-text">
        <div class="title">qC Blocker</div>
        <div id="status-badge" class="badge badge-inactive">Loading...</div>
      </div>
    </div>
    <button id="open-options" class="icon-btn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Binge status for current tab -->
  <div id="binge-tab-section" class="section" style="display:none">
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">
      <span>This Site</span>
      <button id="binge-tab-reset" class="binge-tab-reset-btn">Reset usage</button>
    </div>
    <div id="binge-tab-bar-wrap" class="binge-tab-bar-wrap">
      <div id="binge-tab-bar-fill" class="binge-tab-bar-fill" style="width:0%"></div>
    </div>
    <div class="binge-tab-footer">
      <span id="binge-tab-used" class="binge-tab-used"></span>
      <span id="binge-tab-left" class="binge-tab-left"></span>
    </div>
  </div>

  <!-- Stats -->
  <div class="section">
    <div class="section-label">Today</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-interventions">0</div>
        <div class="stat-label">Blocked</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-minutes">0</div>
        <div class="stat-label">Wasted mins</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-exited">0</div>
        <div class="stat-label">Exited</div>
      </div>
    </div>
  </div>

  <!-- Quick block current site -->
  <div id="quick-block-section" class="section" style="display:none">
    <div class="section-label">Block This Site</div>
    <div id="quick-domain" class="quick-domain"></div>
    <div class="quick-btns">
      <button id="quick-binge-btn" class="quick-btn">⏱ Binge Guard</button>
      <button id="quick-window-btn" class="quick-btn">🪟 Focus Window</button>
    </div>

    <!-- Binge Guard inline form -->
    <div id="quick-binge-form" class="quick-form" style="display:none">
      <div class="quick-form-row">
        <label class="quick-label">Block after</label>
        <div class="quick-selects">
          <select id="qb-mins" class="quick-select">
            <option value="0">0 min</option>
            <option value="1">1 min</option>
            <option value="2">2 min</option>
            <option value="3">3 min</option>
            <option value="4">4 min</option>
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="15">15 min</option>
            <option value="20" selected>20 min</option>
            <option value="25">25 min</option>
            <option value="30">30 min</option>
            <option value="45">45 min</option>
            <option value="60">60 min</option>
            <option value="90">90 min</option>
            <option value="120">120 min</option>
            <option value="150">150 min</option>
            <option value="180">180 min</option>
            <option value="210">210 min</option>
            <option value="240">240 min</option>
            <option value="300">300 min</option>
            <option value="360">360 min</option>
            <option value="420">420 min</option>
            <option value="480">480 min</option>
          </select>
          <select id="qb-secs" class="quick-select">
            <option value="0" selected>0 sec</option>
            <option value="5">5 sec</option>
            <option value="10">10 sec</option>
            <option value="15">15 sec</option>
            <option value="20">20 sec</option>
            <option value="25">25 sec</option>
            <option value="30">30 sec</option>
            <option value="45">45 sec</option>
          </select>
        </div>
      </div>
      <div class="quick-form-row">
        <label class="quick-label">Rolling window</label>
        <select id="qb-window" class="quick-select">
          <option value="1" selected>1 hr</option>
          <option value="2">2 hr</option>
          <option value="3">3 hr</option>
          <option value="4">4 hr</option>
          <option value="6">6 hr</option>
          <option value="8">8 hr</option>
          <option value="12">12 hr</option>
          <option value="24">24 hr</option>
        </select>
      </div>
      <button id="qb-save" class="quick-save-btn">Save Binge Rule</button>
      <div id="qb-status" class="quick-status"></div>
    </div>

    <!-- Focus Window inline form -->
    <div id="quick-window-form" class="quick-form" style="display:none">
      <div class="quick-form-row">
        <label class="quick-label">Add to window</label>
        <select id="qw-window-select" class="quick-select" style="flex:1"></select>
      </div>
      <button id="qw-save" class="quick-save-btn">Add to Window</button>
      <div id="qw-status" class="quick-status"></div>
    </div>
  </div>

  <!-- Focus Windows -->
  <div class="section">
    <div class="section-label">Focus Windows</div>
    <div id="windows-display" class="windows-display"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button id="open-options-link" class="footer-btn">
      Open Settings
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
