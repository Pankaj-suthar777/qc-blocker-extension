<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Distraction Blocker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">🧠</span>
      <div class="header-text">
        <div class="title">Distraction Blocker</div>
        <div id="status-badge" class="badge badge-inactive">Loading...</div>
      </div>
    </div>
    <button id="open-options" class="icon-btn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Binge status for current tab -->
  <div id="binge-tab-section" class="section" style="display:none">
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">
      <span>This Site</span>
      <button id="binge-tab-reset" class="binge-tab-reset-btn">Reset usage</button>
    </div>
    <div id="binge-tab-bar-wrap" class="binge-tab-bar-wrap">
      <div id="binge-tab-bar-fill" class="binge-tab-bar-fill" style="width:0%"></div>
    </div>
    <div class="binge-tab-footer">
      <span id="binge-tab-used" class="binge-tab-used"></span>
      <span id="binge-tab-left" class="binge-tab-left"></span>
    </div>
  </div>

  <!-- Stats -->
  <div class="section">
    <div class="section-label">Today</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-interventions">0</div>
        <div class="stat-label">Blocked</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-minutes">0</div>
        <div class="stat-label">Wasted mins</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-exited">0</div>
        <div class="stat-label">Exited</div>
      </div>
    </div>
  </div>

  <!-- Focus Windows -->
  <div class="section">
    <div class="section-label">Focus Windows</div>
    <div id="windows-display" class="windows-display"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button id="whitelist-btn" class="footer-btn footer-btn-ghost" style="display:none">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span id="whitelist-btn-label">Whitelist this site</span>
    </button>
    <button id="pause-btn" class="footer-btn footer-btn-pause">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      <span id="pause-btn-label">Pause for 30 min</span>
    </button>
    <button id="open-options-link" class="footer-btn">
      Open Settings
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
